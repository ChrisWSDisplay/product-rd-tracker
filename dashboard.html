<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product R&D Tracker Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Product R&D Tracker</p>
          <h1>Dashboard</h1>
        </div>
        <button class="primary-btn">+ New Initiative</button>
      </header>

      <section class="kpi-grid" id="kpiGrid"></section>

      <section class="panel">
        <div class="panel-header">
          <h2>Product Initiatives</h2>
          <span id="initiativeCount" class="tag"></span>
        </div>
        <div class="import-panel">
          <h3>Import CSV/TSV from Google Sheets</h3>
          <p class="import-help">
            Use row 1 from the <strong>2026</strong> tab as your exact headers. Upload comma-separated
            (.csv) or tab-separated (.tsv/.txt) files.
          </p>
          <label class="file-picker">
            <span>Choose CSV or TSV file</span>
            <input id="csvFileInput" type="file" accept=".csv,.tsv,.txt,text/csv,text/tab-separated-values" />
          </label>
          <div class="import-actions">
            <button id="resetDataBtn" class="secondary-btn">Reset sample data</button>
          </div>
          <p id="importStatus" class="import-status" role="status" aria-live="polite">
            Using built-in sample data.
          </p>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="initiativeTableHead"></thead>
            <tbody id="initiativeTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="split-grid">
        <article class="panel">
          <div class="panel-header">
            <h2>Stage Distribution</h2>
          </div>
          <ul id="stageBreakdown" class="stage-list"></ul>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>Upcoming Milestones</h2>
          </div>
          <ul id="milestoneList" class="timeline"></ul>
        </article>
      </section>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
