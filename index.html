<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product R&D Tracker</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Product R&D Tracker</h1>
      <p>Upload a CSV or start with sample products to track delivery progress.</p>
    </header>

    <main class="layout">
      <section class="card" aria-labelledby="import-title">
        <h2 id="import-title">Import Products</h2>
        <p class="subtle-text">
          Upload CSV columns: name, stage, owner, dueDate, priority, notes, percentComplete
        </p>
        <label class="upload-control" for="csv-upload">
          <span>Choose CSV File</span>
          <input id="csv-upload" type="file" accept=".csv,text/csv" />
        </label>
        <p id="import-status" class="import-status" role="status" aria-live="polite"></p>
      </section>

      <section class="card" aria-labelledby="products-title">
        <div class="table-header">
          <h2 id="products-title">Products</h2>
        </div>
        <div id="products-root"></div>
      </section>
    </main>

    <script src="scripts/app.js"></script>
  </body>
</html>
