<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product R&D Tracker</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Product R&D Tracker</h1>
      <p>Upload your Google Sheet export and keep row 1 headers exactly as-is.</p>
    </header>

    <main class="layout">
      <section class="card" aria-labelledby="import-title">
        <h2 id="import-title">Import Products</h2>
        <p class="subtle-text">
          Required headers (in table order): Year Completed, Product, R&amp;D Channel, Test Location,
          Project Status, Percentages, Cost. CSV and TSV are supported.
        </p>
        <label class="upload-control" for="csv-upload">
          <span>Choose CSV or TSV File</span>
          <input id="csv-upload" type="file" accept=".csv,.tsv,.txt,text/csv,text/tab-separated-values" />
        </label>
        <p id="import-status" class="import-status" role="status" aria-live="polite"></p>
        <div id="import-debug" class="debug-box" aria-live="polite"></div>
      </section>

      <section class="card" aria-labelledby="products-title">
        <div class="table-header">
          <h2 id="products-title">Products</h2>
        </div>
        <div id="products-root"></div>
      </section>
    </main>

    <script src="scripts/app.js"></script>
  </body>
</html>
